[peppar]
# External F9T-BOT on USB (bypasses internal E810 F9T and I2C limitations)
serial = "/dev/ttyACM2"
baud = 9600
ubx_port = "USB"
receiver = "f9t"
ptp_profile = "e810"
ptp_dev = "/dev/ptp2"
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
position_file = "data/position.json"
systems = "gps,gal"
