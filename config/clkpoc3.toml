[peppar]
serial = "/dev/ttyACM1"
baud = 9600
ubx_port = "USB"
receiver = "f9t-l5"
# No ptp_dev — the engine does not use the CM4's PHC.
# ts2phc disciplines bcm_phy_ptp from DO PPS on SYNC_IN independently.
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
ssr_mount = "SSRA01CAS1"
systems = "gps,gal"

# CTI OSC5A2B02 OCXO via AD5693R DAC on I2C bus 1.
# Characterized 2026-04-14: gain=1.062, linearity <5 ppb over ±200 ppb.
# OCXO runs +149 ppb high at DAC midscale.
do_label = "ocxo-clkpoc3"
do_type = "vcocxo"
dac_bus = 1
dac_addr = "0x4C"
dac_bits = 16
# Sign verified 2026-04-14: freerun at center shows -149 ppb (slow),
# not +149 as previously characterized.  Positive ppb_per_code means
# higher code → higher frequency → corrects the slow crystal.
dac_ppb_per_code = "0.0361"
dac_type = "ad5693r"

# TADD-2 Mini divider: ARM on GPIO 16, syncs 10 MHz → 1 PPS.
tadd_gpio = 16

# TICC #3: chA = DO PPS, chB = GNSS PPS.
# Engine uses TICC differential measurement as servo input (--ticc-drive).
ticc_port = "/dev/ticc3"
ticc_drive = true
