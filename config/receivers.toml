# Device configuration for PePPAR Fix on TimeHat.
#
# udev rules: config/99-timehat-devices.rules
# Pattern shared with testAnt rig (see shared_files.toml).

[receiver.3RD]
port = "/dev/gnss-top"          # udev symlink, stable across reboots (matched by USB ID_PATH)
baud = 115200
note = "F9T-3RD (EVK-F9T-20-00, ZED-F9T-20B); Patch2 antenna; no GLONASS (-20B variant)"

[ticc]
port = "/dev/ticc"              # udev symlink, matched by Arduino serial number
baud = 115200
note = "TAPR TICC #3; chA = TimeHAT PHC PPS OUT (SDP0, disciplined), chB = F9T-3RD PPS (raw GPS)"

[nic.e810]
model = "Intel E810-XXVDA4T"
status = "on order (2026-03-17)"
gnss = "/dev/gnss0"             # onboard F9T via ice driver (I2C, GNSS_TYPE_UBX)
note = "OCXO, 4x25G, SyncE, DPLL (ZL30795), onboard ZED-F9T. PHC and DPLL are independent clock domains — adjfine() works regardless of DPLL state."

[ptp.i226]
device = "/dev/ptp0"
pps_pin = 1
extts_channel = 0
timescale = "tai"
track_kp = 0.005
track_ki = 0.0005
track_max_ppb = 100000.0
track_restep_ns = 100000.0
obs_idle_timeout_s = 15.0
max_broadcast_age_s = 30.0
require_ssr = false
max_ssr_age_s = 30.0
min_correlation_confidence = 0.5
min_broadcast_confidence = 0.0
min_ssr_confidence = 0.0
program_pin = true
note = "Intel i226 / igc timing core with explicit SDP pin mapping"

[ptp.e810]
device = "/dev/ptp1"
pps_pin = 0
extts_channel = 0
timescale = "tai"
track_kp = 0.05
track_ki = 0.01
track_max_ppb = 1000000.0
track_restep_ns = 100000.0
obs_idle_timeout_s = 15.0
max_broadcast_age_s = 30.0
require_ssr = false
max_ssr_age_s = 30.0
min_correlation_confidence = 0.5
min_broadcast_confidence = 0.0
min_ssr_confidence = 0.0
program_pin = false
note = "Intel E810 timing PHC with EXTS channels exposed but no programmable pins via current driver"
