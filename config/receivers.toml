# Device configuration for PePPAR Fix on TimeHat.
#
# udev rules: config/99-timehat-devices.rules
# Pattern shared with testAnt rig (see shared_files.toml).

[receiver.3RD]
port = "/dev/gnss-top"          # udev symlink, stable across reboots (matched by USB ID_PATH)
baud = 115200
note = "F9T-3RD (EVK-F9T-20-00, ZED-F9T-20B); Patch2 antenna; no GLONASS (-20B variant)"

[ticc]
port = "/dev/ticc"              # udev symlink, matched by Arduino serial number
baud = 115200
note = "TAPR TICC #3; chA = TimeHAT PHC PPS OUT (SDP0, disciplined), chB = F9T-3RD PPS (raw GPS)"

[nic.e810]
model = "Intel E810-XXVDA4T"
status = "on order (2026-03-17)"
gnss = "/dev/gnss0"             # onboard F9T via ice driver (I2C, GNSS_TYPE_UBX)
note = "OCXO, 4x25G, SyncE, DPLL (ZL30795), onboard ZED-F9T. PHC and DPLL are independent clock domains — adjfine() works regardless of DPLL state."

[ptp.i226]
device = "/dev/ptp0"
pps_pin = 1
extts_channel = 0
timescale = "tai"
measurement_rate_ms = 1000    # 1 Hz — USB serial has ample bandwidth
sfrbx_rate = 1                # every epoch — serial bandwidth is free
# PHC bootstrap — uses ADJ_SETOFFSET (±2 µs precision, no lag compensation).
# Fallback params (only used if ADJ_SETOFFSET fails):
phc_settime_lag_ns = 200000   #   clock_settime lag (aim correction)
phc_optimal_stop_limit_s = 1.0  #   optimal stop search budget
phc_step_threshold_ns = 10000 # skip bootstrap if phase error already within this
# Servo tuning — Kp chosen for damping ratio zeta ≈ 0.5 with Ki=0.001.
# zeta = Kp / (2 * sqrt(Ki)) = 0.03 / (2 * 0.0316) = 0.47
# Combined with bootstrap glide (zeta_target=0.7), the servo should
# converge in ~60s without excessive overshoot.
track_kp = 0.03
track_ki = 0.001
track_max_ppb = 100000.0
track_outlier_ns = 10000.0
track_restep_ns = 100000.0
discipline_interval = 1
adaptive_interval = true
min_interval = 1
max_interval = 10
gain_ref_sigma = 4.0
gain_min_scale = 0.1
gain_max_scale = 0.5
converge_error_ns = 5000.0
converge_min_scale = 1.0
glide_zeta = 0.7              # target damping ratio for bootstrap glide (0.5-1.0)
scheduler_converge_threshold_ns = 1000.0
scheduler_settle_window = 20
scheduler_unconverge_factor = 10.0
obs_idle_timeout_s = 15.0
max_broadcast_age_s = 30.0
require_ssr = false
max_ssr_age_s = 30.0
min_correlation_confidence = 0.5
min_broadcast_confidence = 0.0
min_ssr_confidence = 0.0
program_pin = true
pps_out_pin = 0               # SDP0 outputs disciplined PPS to TICC chA
pps_out_channel = 0           # PEROUT channel 0
note = "Intel i226 / igc timing core with explicit SDP pin mapping"

[ptp.e810]
device = "/dev/ptp1"
# Pin/channel mapping for E810-XXVDA4T with external F9T on SMA:
#   GNSS (pin 0, chan 0) = internal F9T PPS (default EXTTS)
#   SMA1 (pin 1, chan 1) = top bracket  → TICC #3 chA (PEROUT, PPS OUT)
#   SMA2 (pin 2, chan 2) = bottom bracket ← F9T-BOT PPS (EXTTS, PPS IN)
# With external F9T: pps_pin=2 extts_channel=2 pps_out_pin=1.
pps_pin = 2                   # SMA2 = PPS IN from external F9T
extts_channel = 2             # SMA2 is on EXTTS channel 2
timescale = "tai"
measurement_rate_ms = 2000    # 0.5 Hz — lossless on E810 AQ I2C (15 B/cmd, ~1.6 kB/s).
                              # Every servo epoch has full PPS+qErr+PPP stack.
                              # Intervening 1 Hz PPS events are pruned by the gate.
sfrbx_rate = 0                # disabled — SFRBX consumes ~400 B/s on I2C, pushing total
                              # output well above bus capacity.  Ephemeris comes from NTRIP.
# PHC bootstrap — uses ADJ_SETOFFSET (±2 ns precision, no lag compensation).
# Fallback params (only used if ADJ_SETOFFSET fails):
phc_settime_lag_ns = 16000000 #   clock_settime lag (aim correction)
phc_optimal_stop_limit_s = 5.0  #   optimal stop search budget
phc_step_threshold_ns = 10000 # skip bootstrap if phase error already within this
                              # (was 2ms for clock_settime; now ±10µs with ADJ_SETOFFSET)
pps_out_pin = 1               # SMA1 (top bracket connector) → TICC #3 chA
pps_out_channel = 1           # PEROUT channel 1 (SMA1 is on channel 1)
# Servo tuning — OCXO with bootstrap glide.  The glide handles the
# large initial phase error (±2 ms); the servo just needs enough Kp
# to damp the resulting trajectory.
# zeta = Kp / (2 * sqrt(Ki)) = 0.015 / (2 * 0.0316) = 0.24
track_kp = 0.015
track_ki = 0.001
track_max_ppb = 250000.0   # must exceed glide: 0.7 * sqrt(0.001) * 10e6 ≈ 220k ppb
track_outlier_ns = 50000.0
track_restep_ns = 50000000.0  # 50 ms — generous during initial convergence from ±2 ms step
discipline_interval = 1
gain_ref_sigma = 4.0
gain_min_scale = 0.1
gain_max_scale = 0.5
converge_error_ns = 50000.0   # larger than i226 — E810 step is ±2 ms
converge_min_scale = 1.0
glide_zeta = 0.7              # target damping ratio for bootstrap glide (0.5-1.0)
scheduler_converge_threshold_ns = 5000.0  # 5 µs — looser than i226
scheduler_settle_window = 20
scheduler_unconverge_factor = 10.0
obs_idle_timeout_s = 15.0
max_broadcast_age_s = 30.0
require_ssr = false
max_ssr_age_s = 30.0
min_correlation_confidence = 0.5
min_broadcast_confidence = 0.0
min_ssr_confidence = 0.0
program_pin = false
note = "Intel E810 timing PHC; bimodal clock_settime latency, no PTP_SYS_OFFSET_PRECISE, no programmable pins"

[ptp.otcBob1]
device = "/dev/ptp0"
timescale = "tai"
pps_pin = 0
extts_channel = 0
perout_channel = 0
# ClockMatrix FCW steering via I2C — DISABLED: FCW controls DPLL_3
# output (PPS) but NOT the 25 MHz PHY clock to i226.  PHC frequency
# must use adjfine.  Re-enable once we identify which DPLL/FOD
# drives the 25 MHz.
#clockmatrix_bus = 15
#clockmatrix_addr = "0x58"
#clockmatrix_dpll_actuator = 3
#clockmatrix_dpll_phase = 2
#clockmatrix_pps_clk = 2
# Servo tuning — OCXO has lower noise, can use tighter gains
track_kp = 0.03
track_ki = 0.001
track_max_ppb = 244000.0
track_restep_ns = 50000000.0  # 50 ms — generous during initial bringup
track_outlier_ns = 50000.0
discipline_interval = 1
gain_ref_sigma = 4.0
gain_min_scale = 0.1
gain_max_scale = 0.5
converge_error_ns = 5000.0
converge_min_scale = 1.0
glide_zeta = 0.7
scheduler_converge_threshold_ns = 5000.0
scheduler_settle_window = 20
scheduler_unconverge_factor = 10.0
obs_idle_timeout_s = 15.0
max_broadcast_age_s = 30.0
require_ssr = false
max_ssr_age_s = 30.0
min_correlation_confidence = 0.5
program_pin = false
note = "Timebeat OTC SBC with Renesas 8A34002 ClockMatrix, OCXO, i226. FCW steering at 0.111 fppb resolution."
