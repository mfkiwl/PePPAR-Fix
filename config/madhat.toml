[peppar]
# F9T has no USB serial number — port can change on re-enumeration.
# Use the stable /dev/serial/by-id/ symlink which matches by USB
# device descriptor (vendor + product), not by enumeration order.
serial = "/dev/serial/by-id/usb-u-blox_AG_-_www.u-blox.com_u-blox_GNSS_receiver-if00"
baud = 115200
ubx_port = "USB"
receiver = "f9t-l5"
ptp_profile = "i226"
ptp_dev = "/dev/ptp1"
ntrip_conf = "ntrip.conf"
eph_mount = "BCEP00BKG0"
# CNES SSR for PPP-AR (credentials in ntrip-cnes.conf)
ssr_ntrip_conf = "ntrip-cnes.conf"
systems = "gps,gal"

# TICC #2: chA = PEROUT (i226 PPS OUT), chB = GNSS PPS.
ticc_port = "/dev/ticc2"
